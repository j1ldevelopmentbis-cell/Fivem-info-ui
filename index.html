<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fivem info by J1L</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="notify-container" id="notify-container">
        <div class="notification normal">
            <div class="icon-box"><i class="fa-solid fa-circle-info"></i></div>
            <div class="text-box">
                <h4>Information</h4>
                <p>Welcome to the city! Please read the rules.</p>
            </div>
        </div>

        <div class="notification success">
            <div class="icon-box"><i class="fa-solid fa-check-circle"></i></div>
            <div class="text-box">
                <h4>Status</h4>
                <p>Systems are fully operational. Enjoy your stay.</p>
            </div>
        </div>

        <div class="notification warn">
            <div class="icon-box"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="text-box">
                <h4>Warning</h4>
                <p>Always stay in character (IC). No RDM or VDM.</p>
            </div>
        </div>

        <div class="notification message">
            <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
            <div class="text-box">
                <h4>Community</h4>
                <p>Join our Discord: discord.gg/yourlink</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
